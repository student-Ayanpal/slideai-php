<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideAI Loading Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ========================================
           SLIDEAI PREMIUM LOADING OVERLAY
           Drop this CSS and HTML into any page
           Toggle .active class to show/hide
        ======================================== */

        .slideai-loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 6, 10, 0.97);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slideai-loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Animated Gradient Background */
        .slideai-loader-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .slideai-loader-gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
        }

        .slideai-orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation: slideai-orb-float 15s ease-in-out infinite;
        }

        .slideai-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            animation: slideai-orb-float 18s ease-in-out infinite reverse;
        }

        @keyframes slideai-orb-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -30px) scale(1.1); }
        }

        /* Floating Particles */
        .slideai-loader-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .slideai-loader-particle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            opacity: 0;
            animation: slideai-particle-float 10s infinite ease-in-out;
        }

        .slideai-loader-particle:nth-child(1) { width: 4px; height: 4px; left: 10%; top: 20%; animation-delay: 0s; animation-duration: 12s; }
        .slideai-loader-particle:nth-child(2) { width: 6px; height: 6px; left: 20%; top: 80%; animation-delay: 1s; animation-duration: 14s; }
        .slideai-loader-particle:nth-child(3) { width: 3px; height: 3px; left: 30%; top: 40%; animation-delay: 2s; animation-duration: 10s; }
        .slideai-loader-particle:nth-child(4) { width: 5px; height: 5px; left: 40%; top: 60%; animation-delay: 0.5s; animation-duration: 11s; }
        .slideai-loader-particle:nth-child(5) { width: 4px; height: 4px; left: 50%; top: 25%; animation-delay: 1.5s; animation-duration: 13s; }
        .slideai-loader-particle:nth-child(6) { width: 6px; height: 6px; left: 60%; top: 70%; animation-delay: 2.5s; animation-duration: 9s; }
        .slideai-loader-particle:nth-child(7) { width: 3px; height: 3px; left: 70%; top: 30%; animation-delay: 0.8s; animation-duration: 15s; }
        .slideai-loader-particle:nth-child(8) { width: 5px; height: 5px; left: 80%; top: 85%; animation-delay: 1.8s; animation-duration: 10s; }
        .slideai-loader-particle:nth-child(9) { width: 4px; height: 4px; left: 85%; top: 45%; animation-delay: 3s; animation-duration: 12s; }
        .slideai-loader-particle:nth-child(10) { width: 6px; height: 6px; left: 15%; top: 55%; animation-delay: 2.2s; animation-duration: 14s; }
        .slideai-loader-particle:nth-child(11) { width: 3px; height: 3px; left: 25%; top: 15%; animation-delay: 0.3s; animation-duration: 11s; }
        .slideai-loader-particle:nth-child(12) { width: 5px; height: 5px; left: 75%; top: 90%; animation-delay: 1.2s; animation-duration: 13s; }

        @keyframes slideai-particle-float {
            0%, 100% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            10% { opacity: 0.4; }
            50% {
                transform: translateY(-100px) translateX(20px) scale(1.5);
                opacity: 0.6;
            }
            90% { opacity: 0.3; }
        }

        /* Glassmorphism Card */
        .slideai-loader-card {
            background: linear-gradient(135deg, rgba(15, 15, 22, 0.9) 0%, rgba(12, 12, 18, 0.95) 100%);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(148, 163, 184, 0.08);
            border-radius: 32px;
            padding: 56px 64px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 
                0 32px 64px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            animation: slideai-card-entrance 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slideai-loader-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.3), rgba(59, 130, 246, 0.3), transparent);
            border-radius: 32px;
        }

        @keyframes slideai-card-entrance {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Circle Container */
        .slideai-loader-circle-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 36px;
        }

        /* Outer Glow Ring */
        .slideai-loader-glow-ring {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            animation: slideai-glow-pulse 3s ease-in-out infinite;
        }

        @keyframes slideai-glow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* Progress Ring */
        .slideai-loader-progress-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 176px;
            height: 176px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #7c3aed,
                #8b5cf6,
                #3b82f6,
                #06b6d4,
                #3b82f6,
                #8b5cf6,
                #7c3aed
            );
            animation: slideai-ring-rotate 2.5s linear infinite;
            mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2.5px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2.5px));
        }

        @keyframes slideai-ring-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Secondary Ring */
        .slideai-loader-secondary-ring {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 152px;
            height: 152px;
            border-radius: 50%;
            border: 1px dashed rgba(124, 58, 237, 0.2);
            animation: slideai-ring-rotate 8s linear infinite reverse;
        }

        /* Pulsing Gradient Circle */
        .slideai-loader-circle {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideai-circle-pulse 2.5s ease-in-out infinite;
            box-shadow: 
                0 0 60px rgba(124, 58, 237, 0.4),
                0 0 120px rgba(59, 130, 246, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.1);
        }

        @keyframes slideai-circle-pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 
                    0 0 60px rgba(124, 58, 237, 0.4),
                    0 0 120px rgba(59, 130, 246, 0.2),
                    inset 0 2px 4px rgba(255, 255, 255, 0.1);
            }
            50% {
                transform: scale(1.03);
                box-shadow: 
                    0 0 80px rgba(124, 58, 237, 0.5),
                    0 0 150px rgba(59, 130, 246, 0.3),
                    inset 0 2px 4px rgba(255, 255, 255, 0.15);
            }
        }

        /* AI Brain Icon */
        .slideai-loader-icon {
            width: 56px;
            height: 56px;
            animation: slideai-icon-morph 4s ease-in-out infinite;
        }

        .slideai-loader-icon path,
        .slideai-loader-icon circle,
        .slideai-loader-icon line {
            stroke: white;
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes slideai-icon-morph {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(3deg) scale(1.02); }
            50% { transform: rotate(0deg) scale(1); }
            75% { transform: rotate(-3deg) scale(1.02); }
        }

        /* Heading */
        .slideai-loader-heading {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 800;
            font-size: 1.625rem;
            background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }

        /* Subheading */
        .slideai-loader-subheading {
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            color: rgba(148, 163, 184, 0.8);
            margin-bottom: 20px;
        }

        /* Rotating Messages */
        .slideai-loader-messages {
            height: 28px;
            overflow: visible;
            position: relative;
            margin-bottom: 24px;
        }

        .slideai-loader-message {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9375rem;
            color: rgba(148, 163, 184, 0.9);
            position: absolute;
            width: 100%;
            left: 0;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slideai-loader-message.active {
            opacity: 1;
            transform: translateY(0);
        }

        .slideai-loader-message.exit {
            opacity: 0;
            transform: translateY(-15px);
        }

        /* Progress Dots */
        .slideai-loader-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 0;
        }

        .slideai-loader-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(124, 58, 237, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slideai-loader-dot.active {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.6);
            transform: scale(1.3);
        }

        /* Demo Page Styles */
        body {
            margin: 0;
            padding: 0;
            background: #06060a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.015;
            pointer-events: none;
            z-index: 10000;
        }

        .demo-title {
            font-weight: 900;
            font-size: 2.25rem;
            background: linear-gradient(135deg, #c4b5fd 0%, #7c3aed 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }

        .demo-subtitle {
            font-weight: 400;
            font-size: 1rem;
            color: rgba(148, 163, 184, 0.7);
            margin-bottom: 36px;
        }

        .demo-controls {
            display: flex;
            gap: 16px;
        }

        .demo-btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9375rem;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .demo-btn-show {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
            box-shadow: 
                0 4px 16px rgba(124, 58, 237, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .demo-btn-show:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 24px rgba(124, 58, 237, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .demo-btn-hide {
            background: rgba(148, 163, 184, 0.08);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .demo-btn-hide:hover {
            background: rgba(148, 163, 184, 0.12);
            color: white;
        }
    </style>
</head>
<body>

    <!-- Demo Content -->
    <h1 class="demo-title">SlideAI Loading Overlay</h1>
    <p class="demo-subtitle">Click the button below to preview the loading animation</p>

    <div class="demo-controls">
        <button class="demo-btn demo-btn-show" onclick="showLoader()">Show Loader</button>
        <button class="demo-btn demo-btn-hide" onclick="hideLoader()">Hide Loader</button>
    </div>

    <!-- ========================================
         LOADING OVERLAY COMPONENT - START
         Copy everything between START and END
    ======================================== -->
    <div class="slideai-loader-overlay" id="slideaiLoader">
        <!-- Gradient Background -->
        <div class="slideai-loader-bg">
            <div class="slideai-loader-gradient-orb slideai-orb-1"></div>
            <div class="slideai-loader-gradient-orb slideai-orb-2"></div>
        </div>

        <!-- Floating Particles -->
        <div class="slideai-loader-particles">
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
            <div class="slideai-loader-particle"></div>
        </div>

        <!-- Glassmorphism Card -->
        <div class="slideai-loader-card">
            <!-- Circle Container -->
            <div class="slideai-loader-circle-container">
                <!-- Glow Effect -->
                <div class="slideai-loader-glow-ring"></div>
                
                <!-- Animated Progress Ring -->
                <div class="slideai-loader-progress-ring"></div>
                
                <!-- Secondary Dashed Ring -->
                <div class="slideai-loader-secondary-ring"></div>
                
                <!-- Pulsing Gradient Circle -->
                <div class="slideai-loader-circle">
                    <!-- AI Brain Icon -->
                    <svg class="slideai-loader-icon" viewBox="0 0 24 24">
                        <path d="M12 2C8.5 2 6 4.5 6 7.5c0 1.5.5 2.8 1.3 3.8L6 14l2 1.5L6 18l2 2 3-2 1 2 1-2 3 2 2-2-2-2.5 2-1.5-1.3-2.7c.8-1 1.3-2.3 1.3-3.8C18 4.5 15.5 2 12 2z"/>
                        <circle cx="9" cy="7" r="1"/>
                        <circle cx="15" cy="7" r="1"/>
                        <circle cx="12" cy="10" r="1"/>
                        <line x1="9" y1="7" x2="12" y2="10"/>
                        <line x1="15" y1="7" x2="12" y2="10"/>
                        <path d="M19 3l.5 1.5L21 5l-1.5.5L19 7l-.5-1.5L17 5l1.5-.5z"/>
                        <path d="M5 17l.3 1 1 .3-1 .3-.3 1-.3-1-1-.3 1-.3z"/>
                    </svg>
                </div>
            </div>

            <!-- Heading -->
            <h2 class="slideai-loader-heading">Crafting your presentation...</h2>
            
            <!-- Subheading -->
            <p class="slideai-loader-subheading">This usually takes 10-15 seconds</p>

            <!-- Rotating Messages -->
            <div class="slideai-loader-messages">
                <p class="slideai-loader-message active" data-index="0">Asking AI for the best ideas...</p>
                <p class="slideai-loader-message" data-index="1">Designing your slide layouts...</p>
                <p class="slideai-loader-message" data-index="2">Polishing the content...</p>
                <p class="slideai-loader-message" data-index="3">Adding final touches...</p>
                <p class="slideai-loader-message" data-index="4">Almost ready...</p>
            </div>

            <!-- Progress Dots -->
            <div class="slideai-loader-dots">
                <div class="slideai-loader-dot active" data-index="0"></div>
                <div class="slideai-loader-dot" data-index="1"></div>
                <div class="slideai-loader-dot" data-index="2"></div>
                <div class="slideai-loader-dot" data-index="3"></div>
                <div class="slideai-loader-dot" data-index="4"></div>
            </div>
        </div>
    </div>
    <!-- ========================================
         LOADING OVERLAY COMPONENT - END
    ======================================== -->

    <script>
        // ========================================
        // SLIDEAI LOADER CONTROLLER
        // ========================================

        class SlideAILoader {
            constructor() {
                this.overlay = document.getElementById('slideaiLoader');
                this.messages = this.overlay.querySelectorAll('.slideai-loader-message');
                this.dots = this.overlay.querySelectorAll('.slideai-loader-dot');
                this.currentIndex = 0;
                this.interval = null;
            }

            show() {
                this.overlay.classList.add('active');
                this.startMessageRotation();
            }

            hide() {
                this.overlay.classList.remove('active');
                this.stopMessageRotation();
                setTimeout(() => this.resetToFirst(), 500);
            }

            startMessageRotation() {
                this.interval = setInterval(() => {
                    this.nextMessage();
                }, 2500);
            }

            stopMessageRotation() {
                if (this.interval) {
                    clearInterval(this.interval);
                    this.interval = null;
                }
            }

            nextMessage() {
                // Add exit class to current
                this.messages[this.currentIndex].classList.add('exit');
                this.messages[this.currentIndex].classList.remove('active');
                this.dots[this.currentIndex].classList.remove('active');

                // Move to next
                this.currentIndex = (this.currentIndex + 1) % this.messages.length;

                // Remove exit and add active to new current
                setTimeout(() => {
                    this.messages.forEach(m => m.classList.remove('exit'));
                    this.messages[this.currentIndex].classList.add('active');
                    this.dots[this.currentIndex].classList.add('active');
                }, 100);
            }

            resetToFirst() {
                this.messages.forEach(m => {
                    m.classList.remove('active');
                    m.classList.remove('exit');
                });
                this.dots.forEach(d => d.classList.remove('active'));
                this.currentIndex = 0;
                this.messages[0].classList.add('active');
                this.dots[0].classList.add('active');
            }
        }

        // Initialize
        const slideaiLoader = new SlideAILoader();

        // Demo functions
        function showLoader() {
            slideaiLoader.show();
        }

        function hideLoader() {
            slideaiLoader.hide();
        }

        // Usage:
        // slideaiLoader.show();
        // slideaiLoader.hide();
    </script>
</body>
</html>
