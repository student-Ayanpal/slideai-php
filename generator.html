<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideAI - Generate Presentation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-primary: #06060a;
            --bg-secondary: #0c0c12;
            --bg-card: #0f0f16;
            --bg-input: #0a0a10;
            --gradient-purple: #7c3aed;
            --gradient-blue: #3b82f6;
            --gradient-cyan: #06b6d4;
            --gradient: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-subtle: rgba(148, 163, 184, 0.08);
            --border-focus: rgba(124, 58, 237, 0.5);
            --glow-purple: rgba(124, 58, 237, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Noise Texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.015;
            pointer-events: none;
            z-index: 10000;
        }

        /* Progress Bar */
        .progress-bar-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: var(--gradient);
            z-index: 99999;
            transition: width 0.3s ease;
            box-shadow: 
                0 0 10px var(--gradient-purple), 
                0 0 30px var(--gradient-purple),
                0 0 60px var(--gradient-blue);
        }

        .progress-bar-top.animating {
            animation: progressAnim 2.5s ease-in-out forwards;
        }

        @keyframes progressAnim {
            0% { width: 0%; }
            15% { width: 15%; }
            30% { width: 35%; }
            50% { width: 55%; }
            70% { width: 75%; }
            85% { width: 90%; }
            100% { width: 100%; }
        }

        /* Main Container */
        .generator-container {
            display: flex;
            min-height: 100vh;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        /* Left Panel */
        .left-panel {
            width: 40%;
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(15, 15, 22, 0.8) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border-subtle);
            height: fit-content;
            position: sticky;
            top: 1.5rem;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            border-radius: 24px 24px 0 0;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 900;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.03em;
        }

        .page-title .sparkle {
            font-size: 1.5rem;
            animation: sparkle-pulse 2s ease-in-out infinite;
        }

        @keyframes sparkle-pulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(10deg); }
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-bottom: 0.625rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-label i {
            font-size: 0.875rem;
            color: var(--gradient-purple);
        }

        .form-input,
        .form-textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            background: rgba(124, 58, 237, 0.03);
            box-shadow: 
                0 0 0 4px rgba(124, 58, 237, 0.1),
                0 0 30px rgba(124, 58, 237, 0.1),
                inset 0 1px 0 rgba(124, 58, 237, 0.1);
        }

        .form-textarea {
            resize: none;
            min-height: 110px;
            line-height: 1.6;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .char-counter {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .char-counter.warning { color: #f59e0b; }
        .char-counter.danger { color: #ef4444; }

        /* Range Slider */
        .range-container {
            position: relative;
        }

        .range-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.875rem;
        }

        .slide-badge {
            background: var(--gradient);
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.875rem;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            min-width: 44px;
            text-align: center;
        }

        .form-range {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(124, 58, 237, 0.15);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .form-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: var(--gradient);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 
                0 2px 8px rgba(124, 58, 237, 0.4),
                0 0 0 3px rgba(124, 58, 237, 0.1);
            transition: all 0.2s ease;
        }

        .form-range::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 
                0 4px 16px rgba(124, 58, 237, 0.5),
                0 0 0 4px rgba(124, 58, 237, 0.15);
        }

        .form-range::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: var(--gradient);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.4);
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* Color Swatches */
        .color-swatches {
            display: flex;
            gap: 0.875rem;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .color-swatch::before {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            border-radius: inherit;
        }

        .color-swatch::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .color-swatch:hover {
            transform: scale(1.1) translateY(-2px);
        }

        .color-swatch:hover::after {
            opacity: 1;
        }

        .color-swatch.selected {
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 
                0 0 0 3px rgba(255, 255, 255, 0.1),
                0 8px 24px rgba(0, 0, 0, 0.3);
            transform: scale(1.05);
        }

        .color-swatch.selected::after {
            opacity: 1;
        }

        .color-swatch.purple { background: linear-gradient(135deg, #7c3aed, #a855f7); }
        .color-swatch.blue { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .color-swatch.green { background: linear-gradient(135deg, #10b981, #34d399); }
        .color-swatch.red { background: linear-gradient(135deg, #ef4444, #f87171); }
        .color-swatch.orange { background: linear-gradient(135deg, #f97316, #fb923c); }
        .color-swatch.pink { background: linear-gradient(135deg, #ec4899, #f472b6); }

        /* Tone Pills */
        .tone-pills {
            display: flex;
            gap: 0.625rem;
            flex-wrap: wrap;
        }

        .tone-pill {
            padding: 0.625rem 1.125rem;
            border-radius: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tone-pill:hover {
            border-color: rgba(124, 58, 237, 0.3);
            color: var(--text-primary);
            background: rgba(124, 58, 237, 0.05);
        }

        .tone-pill.selected {
            background: var(--gradient);
            border-color: transparent;
            color: var(--text-primary);
            box-shadow: 
                0 4px 16px rgba(124, 58, 237, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 1.125rem;
            border: none;
            border-radius: 14px;
            background: var(--gradient);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 4px 20px rgba(124, 58, 237, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 32px rgba(124, 58, 237, 0.45),
                0 16px 48px rgba(124, 58, 237, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .generate-btn:hover::before {
            left: 100%;
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn.shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .generate-btn .spinner {
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .generate-btn.loading .spinner { display: block; }
        .generate-btn.loading .btn-text { display: none; }
        .generate-btn.loading .btn-icon { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .keyboard-hint {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .keyboard-hint kbd {
            background: var(--bg-input);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
            font-family: 'Inter', sans-serif;
            font-size: 0.6875rem;
            font-weight: 600;
        }

        /* Right Panel */
        .right-panel {
            width: 60%;
            min-height: calc(100vh - 3rem);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 500px;
            text-align: center;
            padding: 2rem;
        }

        .empty-state-icon {
            width: 180px;
            height: 180px;
            margin-bottom: 2rem;
            position: relative;
        }

        .empty-sparkle {
            position: absolute;
            animation: sparkle-float 3s ease-in-out infinite;
        }

        .empty-sparkle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .empty-sparkle:nth-child(2) { top: 30%; right: 15%; animation-delay: 0.5s; }
        .empty-sparkle:nth-child(3) { bottom: 20%; left: 30%; animation-delay: 1s; }
        .empty-sparkle:nth-child(4) { top: 50%; left: 10%; animation-delay: 1.5s; }

        @keyframes sparkle-float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-10px) scale(1.2); opacity: 1; }
        }

        .empty-state h3 {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.9375rem;
        }

        /* Slides Preview */
        .slides-container {
            display: none;
            animation: fade-in 0.5s ease;
        }

        .slides-container.visible {
            display: block;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slides-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        .slides-header h2 {
            font-size: 1.375rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .slides-count {
            background: var(--gradient);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8125rem;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }

        .slides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .slide-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(15, 15, 22, 0.6) 100%);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slide-in 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slide-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-card:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.3);
        }

        .slide-top-border {
            height: 3px;
            background: var(--gradient);
        }

        .slide-content {
            padding: 1.25rem;
        }

        .slide-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.875rem;
        }

        .slide-number {
            background: var(--gradient);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8125rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .slide-title {
            font-size: 0.9375rem;
            font-weight: 700;
            line-height: 1.35;
            letter-spacing: -0.01em;
        }

        .slide-bullets {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .slide-bullets li {
            padding: 0.4rem 0;
            padding-left: 1.25rem;
            position: relative;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            line-height: 1.55;
        }

        .slide-bullets li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 5px;
            background: var(--gradient);
            border-radius: 50%;
        }

        /* Download Button */
        .download-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 1rem 1.75rem;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.625rem;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 24px rgba(16, 185, 129, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .download-btn.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 12px 32px rgba(16, 185, 129, 0.45),
                0 20px 48px rgba(16, 185, 129, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .generator-container {
                flex-direction: column;
            }

            .left-panel,
            .right-panel {
                width: 100%;
            }

            .left-panel {
                position: static;
            }
        }

        @media (max-width: 576px) {
            .generator-container {
                padding: 1rem;
            }

            .left-panel {
                padding: 1.5rem;
            }

            .color-swatches {
                justify-content: center;
            }

            .tone-pills {
                justify-content: center;
            }

            .page-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-bar-top" id="progressBar"></div>

    <!-- Main Container -->
    <div class="generator-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <h1 class="page-title">
                <span class="sparkle">&#10024;</span>
                Generate Presentation
            </h1>

            <form id="generateForm">
                <!-- Topic Input -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-lightbulb"></i>
                        Presentation Topic
                    </label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="topicInput" 
                        placeholder="e.g., Introduction to Machine Learning"
                        maxlength="100"
                        autocomplete="off"
                    >
                </div>

                <!-- Details Textarea -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-text-paragraph"></i>
                        Additional Details
                    </label>
                    <textarea 
                        class="form-textarea" 
                        id="detailsInput" 
                        placeholder="Add any specific points, audience info, or requirements..."
                        maxlength="500"
                    ></textarea>
                    <div class="input-footer">
                        <span class="char-counter" id="charCounter">0 / 500</span>
                    </div>
                </div>

                <!-- Slide Count Range -->
                <div class="form-group">
                    <div class="range-container">
                        <div class="range-header">
                            <label class="form-label" style="margin-bottom: 0;">
                                <i class="bi bi-stack"></i>
                                Number of Slides
                            </label>
                            <span class="slide-badge" id="slideCountBadge">8</span>
                        </div>
                        <input 
                            type="range" 
                            class="form-range" 
                            id="slideRange" 
                            min="3" 
                            max="15" 
                            value="8"
                        >
                        <div class="range-labels">
                            <span>3 slides</span>
                            <span>15 slides</span>
                        </div>
                    </div>
                </div>

                <!-- Color Theme -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-palette"></i>
                        Theme Color
                    </label>
                    <div class="color-swatches">
                        <div class="color-swatch purple selected" data-color="purple" title="Purple"></div>
                        <div class="color-swatch blue" data-color="blue" title="Blue"></div>
                        <div class="color-swatch green" data-color="green" title="Green"></div>
                        <div class="color-swatch red" data-color="red" title="Red"></div>
                        <div class="color-swatch orange" data-color="orange" title="Orange"></div>
                        <div class="color-swatch pink" data-color="pink" title="Pink"></div>
                    </div>
                </div>

                <!-- Tone Selection -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-chat-quote"></i>
                        Presentation Tone
                    </label>
                    <div class="tone-pills">
                        <div class="tone-pill selected" data-tone="professional">Professional</div>
                        <div class="tone-pill" data-tone="creative">Creative</div>
                        <div class="tone-pill" data-tone="academic">Academic</div>
                        <div class="tone-pill" data-tone="sales">Sales</div>
                    </div>
                </div>

                <!-- Generate Button -->
                <button type="submit" class="generate-btn" id="generateBtn">
                    <span class="spinner"></span>
                    <i class="bi bi-stars btn-icon"></i>
                    <span class="btn-text">Generate Slides</span>
                </button>

                <div class="keyboard-hint">
                    Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to generate
                </div>
            </form>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">
                    <svg class="empty-sparkle" width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L13.09 8.26L18 6L15.74 10.91L22 12L15.74 13.09L18 18L13.09 15.74L12 22L10.91 15.74L6 18L8.26 13.09L2 12L8.26 10.91L6 6L10.91 8.26L12 2Z" fill="url(#grad1)"/>
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7c3aed"/>
                                <stop offset="100%" style="stop-color:#3b82f6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="empty-sparkle" width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L13.09 8.26L18 6L15.74 10.91L22 12L15.74 13.09L18 18L13.09 15.74L12 22L10.91 15.74L6 18L8.26 13.09L2 12L8.26 10.91L6 6L10.91 8.26L12 2Z" fill="url(#grad2)"/>
                        <defs>
                            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7c3aed"/>
                                <stop offset="100%" style="stop-color:#3b82f6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="empty-sparkle" width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L13.09 8.26L18 6L15.74 10.91L22 12L15.74 13.09L18 18L13.09 15.74L12 22L10.91 15.74L6 18L8.26 13.09L2 12L8.26 10.91L6 6L10.91 8.26L12 2Z" fill="url(#grad3)"/>
                        <defs>
                            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7c3aed"/>
                                <stop offset="100%" style="stop-color:#3b82f6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="empty-sparkle" width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L13.09 8.26L18 6L15.74 10.91L22 12L15.74 13.09L18 18L13.09 15.74L12 22L10.91 15.74L6 18L8.26 13.09L2 12L8.26 10.91L6 6L10.91 8.26L12 2Z" fill="url(#grad4)"/>
                        <defs>
                            <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7c3aed"/>
                                <stop offset="100%" style="stop-color:#3b82f6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg width="120" height="120" viewBox="0 0 120 120" fill="none" style="position: relative; z-index: 1;">
                        <rect x="20" y="30" width="80" height="60" rx="8" stroke="url(#cardGrad)" stroke-width="2" fill="none" opacity="0.3"/>
                        <rect x="28" y="45" width="40" height="4" rx="2" fill="url(#cardGrad)" opacity="0.5"/>
                        <rect x="28" y="55" width="55" height="3" rx="1.5" fill="url(#cardGrad)" opacity="0.3"/>
                        <rect x="28" y="62" width="45" height="3" rx="1.5" fill="url(#cardGrad)" opacity="0.3"/>
                        <rect x="28" y="69" width="35" height="3" rx="1.5" fill="url(#cardGrad)" opacity="0.3"/>
                        <defs>
                            <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7c3aed"/>
                                <stop offset="100%" style="stop-color:#3b82f6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h3>Your slides will appear here</h3>
                <p>Enter a topic and click generate to create your presentation</p>
            </div>

            <!-- Slides Preview -->
            <div class="slides-container" id="slidesContainer">
                <div class="slides-header">
                    <h2>Generated Slides</h2>
                    <span class="slides-count" id="slidesCount">0 Slides</span>
                </div>
                <div class="slides-grid" id="slidesGrid"></div>
            </div>
        </div>
    </div>

    <!-- Download Button -->
    <button class="download-btn" id="downloadBtn">
        <i class="bi bi-download"></i>
        Download .pptx
    </button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // LocalStorage - Restore saved values
            const savedTopic = localStorage.getItem('slideai_topic');
            const savedDetails = localStorage.getItem('slideai_details');
            if (savedTopic) $('#topicInput').val(savedTopic);
            if (savedDetails) {
                $('#detailsInput').val(savedDetails);
                updateCharCounter();
            }

            // Save to LocalStorage on input
            $('#topicInput').on('input', function() {
                localStorage.setItem('slideai_topic', $(this).val());
            });

            $('#detailsInput').on('input', function() {
                localStorage.setItem('slideai_details', $(this).val());
                updateCharCounter();
            });

            // Character Counter
            function updateCharCounter() {
                const count = $('#detailsInput').val().length;
                const $counter = $('#charCounter');
                $counter.text(`${count} / 500`);
                $counter.removeClass('warning danger');
                if (count >= 450) $counter.addClass('danger');
                else if (count >= 350) $counter.addClass('warning');
            }

            // Slide Range
            $('#slideRange').on('input', function() {
                $('#slideCountBadge').text($(this).val());
            });

            // Color Swatches
            $('.color-swatch').on('click', function() {
                $('.color-swatch').removeClass('selected');
                $(this).addClass('selected');
            });

            // Tone Pills
            $('.tone-pill').on('click', function() {
                $('.tone-pill').removeClass('selected');
                $(this).addClass('selected');
            });

            // Ctrl+Enter shortcut
            $(document).on('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    $('#generateForm').submit();
                }
            });

            // Form Submit
            $('#generateForm').on('submit', function(e) {
                e.preventDefault();
                
                const topic = $('#topicInput').val().trim();
                if (!topic) {
                    $('#generateBtn').addClass('shake');
                    setTimeout(() => $('#generateBtn').removeClass('shake'), 500);
                    $('#topicInput').focus();
                    return;
                }

                // Start loading
                $('#generateBtn').addClass('loading').prop('disabled', true);
                $('#progressBar').addClass('animating');

                // Simulate generation
                setTimeout(() => {
                    const slideCount = parseInt($('#slideRange').val());
                    const tone = $('.tone-pill.selected').data('tone');
                    const color = $('.color-swatch.selected').data('color');
                    
                    generateMockSlides(topic, slideCount, tone, color);
                    
                    $('#progressBar').removeClass('animating').css('width', '100%');
                    setTimeout(() => $('#progressBar').css('width', '0'), 500);
                    
                    $('#generateBtn').removeClass('loading').prop('disabled', false);
                    $('#emptyState').hide();
                    $('#slidesContainer').addClass('visible');
                    $('#downloadBtn').addClass('visible');
                }, 2500);
            });

            // Generate Mock Slides
            function generateMockSlides(topic, count, tone, color) {
                const toneContent = {
                    professional: {
                        titles: ['Executive Summary', 'Market Analysis', 'Strategic Objectives', 'Implementation Plan', 'Key Metrics', 'Risk Assessment', 'Financial Projections', 'Next Steps', 'Q&A Session', 'Appendix'],
                        bullets: ['Data-driven insights for informed decision making', 'Comprehensive market research and competitive analysis', 'Alignment with organizational strategic goals', 'Clear timeline with defined milestones', 'Measurable KPIs for success tracking']
                    },
                    creative: {
                        titles: ['The Big Idea', 'Breaking Boundaries', 'Innovation Lab', 'Design Thinking', 'Creative Vision', 'Inspiration Board', 'The Journey', 'Dream Big', 'Making Magic', 'What\'s Next'],
                        bullets: ['Thinking outside the conventional box', 'Embracing bold and innovative approaches', 'Transforming imagination into reality', 'Creating memorable experiences', 'Pushing creative boundaries further']
                    },
                    academic: {
                        titles: ['Research Overview', 'Literature Review', 'Methodology', 'Data Analysis', 'Key Findings', 'Discussion', 'Implications', 'Limitations', 'Future Research', 'References'],
                        bullets: ['Evidence-based research methodology', 'Peer-reviewed scholarly sources', 'Statistical significance and validity', 'Theoretical framework alignment', 'Contribution to existing knowledge']
                    },
                    sales: {
                        titles: ['The Opportunity', 'Pain Points', 'Our Solution', 'Key Benefits', 'Success Stories', 'Competitive Edge', 'ROI Analysis', 'Pricing Options', 'Getting Started', 'Let\'s Connect'],
                        bullets: ['Proven track record of success', 'Industry-leading customer satisfaction', 'Rapid implementation and onboarding', 'Dedicated support and training', 'Flexible and scalable solutions']
                    }
                };

                const content = toneContent[tone];
                let html = '';

                for (let i = 0; i < count; i++) {
                    const title = i === 0 ? topic : content.titles[i % content.titles.length];
                    const delay = i * 0.08;
                    
                    html += `
                        <div class="slide-card" style="animation-delay: ${delay}s">
                            <div class="slide-top-border" style="background: ${getColorGradient(color)}"></div>
                            <div class="slide-content">
                                <div class="slide-header">
                                    <span class="slide-number">${i + 1}</span>
                                    <h4 class="slide-title">${title}</h4>
                                </div>
                                <ul class="slide-bullets">
                                    ${content.bullets.slice(0, 3).map(b => `<li>${b}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                }

                $('#slidesGrid').html(html);
                $('#slidesCount').text(`${count} Slides`);
            }

            function getColorGradient(color) {
                const gradients = {
                    purple: 'linear-gradient(90deg, #7c3aed, #a855f7)',
                    blue: 'linear-gradient(90deg, #3b82f6, #60a5fa)',
                    green: 'linear-gradient(90deg, #10b981, #34d399)',
                    red: 'linear-gradient(90deg, #ef4444, #f87171)',
                    orange: 'linear-gradient(90deg, #f97316, #fb923c)',
                    pink: 'linear-gradient(90deg, #ec4899, #f472b6)'
                };
                return gradients[color] || gradients.purple;
            }

            // Download button click
            $('#downloadBtn').on('click', function() {
                alert('Download functionality will be connected to your PHP backend.');
            });
        });
    </script>
</body>
</html>
